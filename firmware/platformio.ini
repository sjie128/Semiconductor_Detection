[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200

; Add the libraries needed for thermal and camera
lib_deps = 
    adafruit/Adafruit AMG88xx Library @ ^1.3.0

; These settings help with the limited pins on ESP32-CAM
build_flags = 
    -D CORE_DEBUG_LEVEL=0